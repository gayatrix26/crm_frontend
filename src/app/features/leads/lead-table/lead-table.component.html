<div class="table-wrapper">

    <table
        mat-table
        [dataSource]="dataSource"
        matSort
        class="mat-elevation-z0 lead-table">

        <!-- ==========================================
             CUSTOMER
        =========================================== -->

        <ng-container matColumnDef="customerName">

            <th mat-header-cell *matHeaderCellDef>

                <div class="header-cell">

                    <span mat-sort-header>Customer</span>

                </div>

            </th>

            <td mat-cell *matCellDef="let lead">

                <strong>{{lead.customerName}}</strong>

            </td>

        </ng-container>


        <!-- ==========================================
             PHONE
        =========================================== -->

        <ng-container matColumnDef="phoneNo">

            <th mat-header-cell *matHeaderCellDef>

                <span mat-sort-header>Phone</span>

            </th>

            <td mat-cell *matCellDef="let lead">

                {{lead.phoneNo}}

            </td>

        </ng-container>


        <!-- ==========================================
             CATEGORY
        =========================================== -->

        <ng-container matColumnDef="category">

            <th mat-header-cell *matHeaderCellDef>

                <div class="header-cell">

                    <span mat-sort-header>Category</span>

                    <app-table-filter

                    title="Category"

                    [options]="categoryOptions"

                    (filterChanged)="applyCategoryFilter($event)">

                    </app-table-filter>

                </div>

            </th>

            <td mat-cell *matCellDef="let lead">

               {{lead.category?.categoryName}}

            </td>

        </ng-container>


        <!-- ==========================================
             CITY
        =========================================== -->

        <ng-container matColumnDef="city">

            <th mat-header-cell *matHeaderCellDef>

                <span mat-sort-header>City</span>

            </th>

            <td mat-cell *matCellDef="let lead">

                {{lead.city}}

            </td>

        </ng-container>


        <!-- ==========================================
             SOURCE
        =========================================== -->

        <ng-container matColumnDef="leadSource">

            <th mat-header-cell *matHeaderCellDef>

                <div class="header-cell">

                    <span mat-sort-header>Source</span>

                    <app-table-filter

                    title="Source"

                    [options]="sourceOptions"

                    (filterChanged)="applySourceFilter($event)">

                    </app-table-filter>

                </div>

            </th>

            <td mat-cell *matCellDef="let lead">

               <span class="table-text">

                    {{lead.leadSource}}

                </span>

            </td>

        </ng-container>


        <!-- ==========================================
             STATUS
        =========================================== -->

        <ng-container matColumnDef="status">

            <th mat-header-cell *matHeaderCellDef>

                <div class="header-cell">

                    <span mat-sort-header>Status</span>

                    <app-table-filter

                    title="Status"

                    [options]="statusOptions"

                    (filterChanged)="applyStatusFilter($event)">

                    </app-table-filter>

                </div>

            </th>

            <td mat-cell *matCellDef="let lead">

                <span class="table-text">

                    {{lead.status}}

                </span>

            </td>

        </ng-container>


        <!-- ==========================================
             PRIORITY
        =========================================== -->

        <ng-container matColumnDef="priority">

            <th mat-header-cell *matHeaderCellDef>

                <div class="header-cell">

                    <span mat-sort-header>Priority</span>

                    <app-table-filter

                    title="Priority"

                    [options]="priorityOptions"

                    (filterChanged)="applyPriorityFilter($event)">

                    </app-table-filter>

                </div>

            </th>

            <td mat-cell *matCellDef="let lead">

                <span class="table-text">

                    {{lead.priority}}

                </span>

            </td>

        </ng-container>


        <!-- ==========================================
             EXECUTIVE
        =========================================== -->

        <ng-container matColumnDef="assignedTo">

            <th mat-header-cell *matHeaderCellDef>

                <div class="header-cell">

                    <span mat-sort-header>Executive</span>

                    <app-table-filter

                    title="Executive"

                    [options]="executiveOptions"

                    (filterChanged)="applyExecutiveFilter($event)">

                    </app-table-filter>

                </div>

            </th>

            <td mat-cell *matCellDef="let lead">

                {{lead.assignedTo?.firstName}} {{lead.assignedTo?.lastName}}

            </td>

        </ng-container>


        <!-- ==========================================
     ACTIONS
=========================================== -->

<ng-container matColumnDef="actions">

    <th mat-header-cell *matHeaderCellDef>

        Actions

    </th>


    <td mat-cell *matCellDef="let lead">


        <div class="action-buttons">





            <!-- EDIT -->

            <app-edit-lead

    [leadId]="lead.leadId"

    (leadUpdated)="leadChanged.emit()">

</app-edit-lead>



            <!-- DELETE -->

            <button
                class="action-btn delete-btn"
                (click)="deleteLead(lead.leadId)">

                <i class="bi bi-trash"></i>

            </button>


        </div>


    </td>

</ng-container>


        <!-- ==========================================
             ROWS
        =========================================== -->

        <tr
            mat-header-row
            *matHeaderRowDef="displayedColumns">
        </tr>

        <tr
            mat-row
            *matRowDef="let row; columns: displayedColumns;">
        </tr>

    </table>

</div>


<mat-paginator

    [length]="totalElements"

    [pageSize]="pageSize"

    [pageSizeOptions]="[5,10,20]"

    showFirstLastButtons

    (page)="onPageChange($event)">

</mat-paginator>
