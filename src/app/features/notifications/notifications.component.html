<!-- Notification Panel -->
<div class="card w-96 shadow-2xl animation-slide-down absolute top-[80px] right-6 z-50 max-h-[420px] overflow-hidden flex flex-col">

  <!-- Header -->
  <div class="card-header border-b border-[var(--border-color)]">
    <h3 class="card-title">Notifications</h3>
    <span class="badge badge-primary">3 New</span>
  </div>

  <!-- Notifications List -->
  <div class="overflow-auto flex-1" style="max-height: 340px;">
    
    <!-- Notification Item -->
    <div class="p-4 border-b border-[var(--border-color)] hover:bg-[var(--surface-color)] cursor-pointer">
      <div class="flex gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
          📅
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium">Follow-up due tomorrow</p>
          <p class="text-xs text-light-color mt-1">Acme Hospital - Healthcare Sector</p>
          <p class="text-xs text-light-color mt-2">2 hours ago</p>
        </div>
      </div>
    </div>

    <div class="p-4 border-b border-[var(--border-color)] hover:bg-[var(--surface-color)] cursor-pointer">
      <div class="flex gap-3">
        <div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center flex-shrink-0">
          ✅
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium">Lead status updated</p>
          <p class="text-xs text-light-color mt-1">John from XYZ School moved to Warm Leads</p>
          <p class="text-xs text-light-color mt-2">Yesterday</p>
        </div>
      </div>
    </div>

    <div class="p-4 border-b border-[var(--border-color)] hover:bg-[var(--surface-color)] cursor-pointer">
      <div class="flex gap-3">
        <div class="w-8 h-8 rounded-full bg-amber-100 flex items-center justify-center flex-shrink-0">
          ⚠️
        </div>
        <div class="flex-1">
          <p class="text-sm font-medium">New lead assigned to you</p>
          <p class="text-xs text-light-color mt-1">Global Motors - Automotive</p>
          <p class="text-xs text-light-color mt-2">2 days ago</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div class="p-4 border-t border-[var(--border-color)] text-center">
    <a href="#" class="text-primary-color text-sm font-medium hover:underline">
      View All Notifications
    </a>
  </div>
</div>
