<!-- Reminder Card -->
<div class="card w-96 shadow-2xl animation-slide-down absolute top-[80px] right-6 z-50 overflow-hidden">

  <!-- Header -->
  <div class="card-header">
    <h3 class="card-title">Reminders</h3>
  </div>

  <div class="card-body p-5 space-y-6">

    <!-- Material Date Picker -->
    <div class="form-group">
      <label class="form-label">Select Date</label>
      <mat-form-field class="w-full" appearance="outline">
        <mat-label>Choose a date</mat-label>
        <input matInput 
               [matDatepicker]="picker"
               [(ngModel)]="selectedDate"
               (dateChange)="onDateChange()">
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>
    </div>

    <!-- Pending Follow-ups -->
    <div>
      <h4 class="font-medium mb-4 flex items-center gap-2">
        Pending Follow-ups 
        <span class="badge badge-warning text-xs">3</span>
      </h4>

      <div class="space-y-4 max-h-80 overflow-auto">

        <div class="card border-l-4 border-l-warning-color">
          <div class="card-body p-4">
            <h5 class="font-medium">Follow up with Acme Hospital</h5>
            <p class="text-sm text-light-color mt-1">Call regarding proposal</p>
            <div class="flex justify-between items-center mt-4 text-xs">
              <span class="text-light-color">10:30 AM</span>
              <span class="badge badge-warning">Pending</span>
            </div>
          </div>
        </div>

        <div class="card border-l-4 border-l-warning-color">
          <div class="card-body p-4">
            <h5 class="font-medium">Meeting with XYZ School</h5>
            <p class="text-sm text-light-color mt-1">Demo presentation</p>
            <div class="flex justify-between items-center mt-4 text-xs">
              <span class="text-light-color">02:00 PM</span>
              <span class="badge badge-warning">Pending</span>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <div class="card-footer">
    <button class="button-primary w-full">Add New Reminder</button>
  </div>
</div>
